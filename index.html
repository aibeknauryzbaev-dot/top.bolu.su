<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Су - тіршілік көзі</title>
    <style>
        /* Су және Мұхит (Water & Ocean) тақырыбына арналған дизайн */
        :root {
            --bg-deep: #020b1f; /* Мұхит түбінің қою түсі */
            --bg-surface: #0088ff; /* Ашық су түсі */
            --glass-bg: rgba(255, 255, 255, 0.1); /* Мөлдір шыны */
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --text-dark: #003366;
            --primary-color: #00d4ff;
            --secondary-color: #00e5ff;
            --accent-color: #00ffcc;
            --danger-color: #ff6b6b;
            --border-radius: 25px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Терең су фоны */
        body {
            background: radial-gradient(circle at center, var(--bg-surface) 0%, var(--bg-deep) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Көпіршіктер (Bubbles) анимациясы үшін контейнер */
        .bubble-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            bottom: -50px;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.1));
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: rise linear infinite;
            backdrop-filter: blur(2px);
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            50% { transform: translateY(-50vh) scale(1.2) translateX(20px); }
            100% { transform: translateY(-110vh) scale(1.5) translateX(-20px); opacity: 0; }
        }

        /* Негізгі Контейнер (Glassmorphism - Мөлдір су) */
        .container {
            width: 95%;
            max-width: 1000px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px); /* Артқы фонды бұлдырату (шыны эффектісі) */
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.2);
            display: none; 
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 2px solid var(--glass-border);
            position: relative;
            z-index: 10;
        }

        .active-view {
            display: flex;
            animation: fadeIn 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        @keyframes fadeIn {
            0% { transform: translateY(30px); opacity: 0; filter: blur(10px); }
            100% { transform: translateY(0); opacity: 1; filter: blur(0); }
        }

        /* Типография */
        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 15px;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.8), 0 0 30px rgba(0, 212, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 900;
        }

        p.tip {
            color: #e0f7fa;
            font-size: 1.2rem;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px 20px;
            border-radius: 15px;
            border-left: 4px solid var(--primary-color);
        }

        /* Форма элементтері */
        .form-group {
            width: 100%;
            max-width: 600px;
            margin-bottom: 25px;
            text-align: left;
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
        }

        label {
            display: block;
            font-size: 1.4rem;
            margin-bottom: 10px;
            color: #b2ebf2;
            font-weight: bold;
            letter-spacing: 1px;
        }

        input[type="number"], textarea {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.5rem;
            background-color: rgba(255, 255, 255, 0.9);
            border: 2px solid transparent;
            color: var(--text-dark);
            border-radius: 12px;
            outline: none;
            transition: all 0.3s;
            font-weight: bold;
            box-shadow: inner 0 2px 5px rgba(0,0,0,0.1);
        }

        input[type="number"]:focus, textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            background-color: #ffffff;
        }

        textarea {
            resize: vertical;
            min-height: 160px;
        }

        /* Су көпіршігі пішінді батырмалар */
        button {
            padding: 18px 40px;
            font-size: 1.6rem;
            font-weight: bold;
            color: #003366;
            background: linear-gradient(135deg, #e0f7fa 0%, #80deea 100%);
            border: none;
            border-radius: 30px; /* Көпіршік/Тамшы формасы */
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 
                0 10px 20px rgba(0,0,0,0.3),
                inset -3px -3px 10px rgba(0,0,0,0.1),
                inset 3px 3px 10px rgba(255,255,255,0.8);
            margin: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        /* Батырмадағы жалтырау эффектісі */
        button::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.6), transparent);
            transform: skewX(-20deg);
            transition: all 0.5s;
        }

        button:hover::after {
            left: 150%;
        }

        button:active {
            transform: scale(0.95) translateY(4px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #4dd0e1 0%, #0097a7 100%);
            color: #ffffff;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff8a80 0%, #d50000 100%);
            color: #ffffff;
        }

        /* Қате хабарламасы */
        #error-msg {
            color: white;
            font-size: 1.4rem;
            margin-bottom: 20px;
            display: none;
            background: var(--danger-color);
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        /* Ойын экраны */
        .stats-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .remaining-count {
            font-size: 2rem;
            font-weight: bold;
            color: #ffffff;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 25px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
        }

        .group-counters {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: flex-end;
            flex: 1;
        }

        /* Санағыштар (Су тамшылары) */
        .counter-badge {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-dark);
            background-color: #e0f7fa;
            padding: 8px 20px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2), inset 0 0 10px rgba(255,255,255,0.8);
            transition: all 0.3s;
        }

        /* Орталық нәтиже аймағы (ТІРІ СУ ТАМШЫСЫ / BLOB) */
        .result-area {
            flex-grow: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45vh;
            height: 45vh;
            max-width: 80vw;
            max-height: 80vw;
            margin: 0 auto 40px auto;
            
            /* Судың мөлдір градиенті */
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.9), rgba(0, 212, 255, 0.6) 60%, rgba(0, 51, 102, 0.8) 100%);
            
            /* Тірі тамшы (Blob) анимациясы */
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            animation: morph 8s ease-in-out infinite alternate;
            
            position: relative;
            box-shadow: 
                inset 10px 10px 20px rgba(255, 255, 255, 0.8), 
                inset -10px -10px 20px rgba(0, 0, 0, 0.3),
                0 20px 40px rgba(0,0,0,0.5),
                0 0 50px rgba(0, 212, 255, 0.4); 
            z-index: 5;
        }

        /* Тамшының пішінін өзгерту анимациясы */
        @keyframes morph {
            0%   { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
            34%  { border-radius: 70% 30% 50% 50% / 30% 30% 70% 70%; }
            67%  { border-radius: 100% 60% 60% 100% / 100% 100% 60% 60%; }
            100% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
        }

        /* Экранға шығатын мәтін */
        #current-group-display {
            font-size: clamp(2rem, 5vw, 4.5rem); 
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0;
            transform: scale(0.5) translateY(50px);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); /* Судан атып шыққандай эффект */
            text-align: center;
            padding: 20px;
            /* Су үстіндегі мәтіннің көлеңкесі */
            text-shadow: 
                0 2px 5px rgba(0,0,0,0.5),
                0 0 20px rgba(0, 51, 102, 0.8),
                0 0 40px rgba(0, 212, 255, 0.8);
            z-index: 10;
            line-height: 1.2;
        }

        #current-group-display.show {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .finished-msg {
            color: #ffffff !important;
            font-size: clamp(1.8rem, 4vw, 3.5rem) !important;
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            button { font-size: 1.3rem; padding: 12px 25px; }
            .remaining-count { font-size: 1.4rem; padding: 8px 15px; }
            .counter-badge { font-size: 1.2rem; }
            #current-group-display { font-size: 8vw; }
            .result-area { width: 75vw; height: 75vw; }
        }
    </style>
</head>
<body>

    <!-- 1. Баптау экраны -->
    <div id="setup-view" class="container active-view">
        <h1>Су - тіршілік көзі</h1>
        <p class="tip">Кеңес: Толық экран режиміне өту үшін <b>F11</b> пернесін басыңыз.</p>

        <div id="error-msg"></div>

        <div class="form-group">
            <label for="student-count">Оқушылар саны (Барлығы):</label>
            <input type="number" id="student-count" value="25" min="2" step="1">
        </div>

        <div class="form-group">
            <label for="group-names">Топ атаулары (әр жолға бір су көзі):</label>
            <textarea id="group-names">МҰХИТ
ТЕҢІЗ
ӨЗЕН
КӨЛ
БҰЛАҚ</textarea>
        </div>

        <button onclick="startGame()">Араластыру (Бастау)</button>
    </div>

    <!-- 2. Ойын экраны -->
    <div id="game-view" class="container">
        <div class="stats-header">
            <div class="remaining-count">Қалды: <span id="students-left">0</span></div>
            <div class="group-counters" id="group-counters-container">
                <!-- Осы жерге JS арқылы топ сауыттары (counters) қосылады -->
            </div>
        </div>

        <!-- Тірі су тамшысы бейнесі -->
        <div class="result-area">
            <!-- Шығатын мәтін -->
            <div id="current-group-display">Бастау үшін батырманы басыңыз</div>
        </div>

        <div class="controls">
            <button id="next-btn" onclick="drawNext()" class="btn-secondary">Келесі оқушы</button>
            <button onclick="resetApp()" class="btn-danger">Қайта бастау</button>
        </div>
    </div>

    <script>
        // Ойынның негізгі айнымалылары
        let deck = []; 
        let groupLimits = {}; 
        let totalStudents = 0;
        let drawnCount = 0;

        const setupView = document.getElementById('setup-view');
        const gameView = document.getElementById('game-view');
        const errorMsg = document.getElementById('error-msg');
        const displayArea = document.getElementById('current-group-display');
        const nextBtn = document.getElementById('next-btn');

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
            setTimeout(() => {
                errorMsg.style.display = 'none';
            }, 5000);
        }

        function startGame() {
            const countInput = parseInt(document.getElementById('student-count').value);
            const groupsRaw = document.getElementById('group-names').value.split('\n');
            
            const groups = groupsRaw.map(g => g.trim()).filter(g => g !== '');

            if (isNaN(countInput) || countInput < 2) {
                showError('Қате: Оқушылар саны кем дегенде 2 болуы тиіс!');
                return;
            }
            if (groups.length < 2) {
                showError('Қате: Кем дегенде 2 топ атауын енгізіңіз!');
                return;
            }
            if (countInput < groups.length) {
                showError('Қате: Оқушылар саны топтар санынан кем болмауы керек!');
                return;
            }

            totalStudents = countInput;
            drawnCount = 0;
            groupLimits = {};
            deck = [];

            const baseCount = Math.floor(totalStudents / groups.length);
            let remainder = totalStudents % groups.length;

            groups.forEach(group => {
                groupLimits[group] = baseCount;
            });
            for (let i = 0; i < remainder; i++) {
                groupLimits[groups[i]]++;
            }

            for (const [group, count] of Object.entries(groupLimits)) {
                for (let i = 0; i < count; i++) {
                    deck.push(group);
                }
            }

            // Fisher-Yates Shuffle
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]]; 
            }

            updateCountersUI();
            
            setupView.classList.remove('active-view');
            gameView.classList.add('active-view');
            
            displayArea.className = '';
            displayArea.innerHTML = 'ДАЙЫНСЫЗ<br>БА?';
            setTimeout(() => displayArea.classList.add('show'), 100);
            
            nextBtn.style.display = 'inline-block';
            nextBtn.textContent = 'Келесі оқушы';
        }

        function drawNext() {
            if (deck.length === 0) return;

            // Суға батып кеткендей эффект
            displayArea.classList.remove('show');
            displayArea.style.transform = 'scale(0.5) translateY(50px)'; 
            
            setTimeout(() => {
                const drawnGroup = deck.pop();
                drawnCount++;
                
                groupLimits[drawnGroup]--;
                
                displayArea.textContent = drawnGroup;

                // Судан атып шыққандай эффект
                setTimeout(() => {
                    displayArea.classList.add('show');
                    displayArea.style.transform = `scale(1) translateY(0)`;
                }, 50);
                
                updateCountersUI();

                if (deck.length === 0) {
                    setTimeout(() => {
                        displayArea.classList.remove('show');
                        setTimeout(() => {
                            displayArea.innerHTML = 'БӨЛУ<br>АЯҚТАЛДЫ 💧';
                            displayArea.classList.add('finished-msg', 'show');
                            displayArea.style.transform = `scale(1) translateY(0)`;
                            nextBtn.style.display = 'none'; 
                        }, 300);
                    }, 1500); 
                }
            }, 300); 
        }

        function updateCountersUI() {
            document.getElementById('students-left').textContent = (totalStudents - drawnCount);
            
            const container = document.getElementById('group-counters-container');
            container.innerHTML = ''; 

            // Су реңктері
            const waterColors = ['#e0f7fa', '#b2ebf2', '#80deea', '#4dd0e1', '#26c6da', '#00bcd4'];
            let colorIndex = 0;

            for (const [group, count] of Object.entries(groupLimits)) {
                const badge = document.createElement('div');
                badge.className = 'counter-badge';
                
                const bgColor = waterColors[colorIndex % waterColors.length];
                badge.style.backgroundColor = bgColor;
                colorIndex++;

                if (count === 0) {
                    badge.style.opacity = '0.4';
                    badge.style.filter = 'grayscale(100%)';
                } else {
                    badge.style.color = '#003366'; // Белсенді кезде қара-көк түс
                }
                badge.textContent = `${group}: ${count}`;
                container.appendChild(badge);
            }
        }

        function resetApp() {
            gameView.classList.remove('active-view');
            setupView.classList.add('active-view');
            displayArea.className = ''; 
        }

        // Көпіршіктер эффектісі (Фондағы су көпіршіктері)
        function createBubbles() {
            const bubbleContainer = document.createElement('div');
            bubbleContainer.className = 'bubble-container';
            
            // 50 көпіршік жасаймыз
            for (let i = 0; i < 50; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                
                // Кездейсоқ өлшемдер мен позициялар
                const size = Math.random() * 40 + 10; // 10px-тен 50px-ке дейін
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + 'vw';
                
                // Анимация жылдамдығы
                bubble.style.animationDuration = (Math.random() * 10 + 5) + 's'; // 5s-15s
                bubble.style.animationDelay = (Math.random() * 10) + 's';
                
                bubbleContainer.appendChild(bubble);
            }
            document.body.prepend(bubbleContainer); 
        }
        
        window.onload = createBubbles;
    </script>
</body>
</html>
